name: audiobookshelf

services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:${ABS_VERSION:-2.33.1}
    container_name: audiobookshelf
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
    expose:
      - "80"
    volumes:
      - ${DATA_DIR:-/srv/docker}/audiobookshelf/audiobooks:/audiobooks
      - ${DATA_DIR:-/srv/docker}/audiobookshelf/ebooks:/ebooks
      - ${DATA_DIR:-/srv/docker}/audiobookshelf/podcasts:/podcasts
      - ${DATA_DIR:-/srv/docker}/audiobookshelf/metadata:/metadata
      - ${DATA_DIR:-/srv/docker}/audiobookshelf/config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s

  audiobookshelf-proxy:
    image: nginx:1.27-alpine
    container_name: audiobookshelf-proxy
    depends_on:
      - audiobookshelf
    ports:
      - "${ABS_PORT:-13378}:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${DATA_DIR:-/srv/docker}/audiobookshelf/nginx-cache:/var/cache/nginx/abs-covers
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
