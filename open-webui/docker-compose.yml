services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile.open-webui
    image: open-webui-local:main
    container_name: open-webui
    env_file:
      - .env
    ports:
      - "${OPENWEBUI_PORT:-3040}:8080"
    volumes:
      - ${HOST_DATA_DIR:-/srv/docker}/ollama/open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - ENABLE_WEBSOCKET_SUPPORT=${ENABLE_WEBSOCKET_SUPPORT:-true}
      - WEBUI_AUTH=true
      - WEBUI_NAME=${WEBUI_NAME:-Ollama WebUI}
      - OFFLINE_MODE=true
    mem_limit: ${OPENWEBUI_MEM_LIMIT:-2g}
    mem_reservation: ${OPENWEBUI_MEM_RESERVATION:-768m}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mcpo-context7:
    image: ghcr.io/open-webui/mcpo:main
    container_name: mcpo-context7
    profiles:
      - mcpo
    ports:
      - "${MCPO_CONTEXT7_PORT:-8011}:8000"
    command:
      - --port
      - "8000"
      - --api-key
      - "${MCPO_CONTEXT7_API_KEY}"
      - --server-type
      - streamable-http
      - --
      - https://mcp.context7.com/mcp
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  codex-gateway:
    build:
      context: ./codex-gateway
    container_name: codex-gateway
    profiles:
      - codex
    env_file:
      - .env
    ports:
      - "${CODEX_GATEWAY_PORT:-8091}:8091"
    environment:
      - CODEX_GATEWAY_API_KEY=${CODEX_GATEWAY_API_KEY}
      - CODEX_WORKSPACE_ROOT=/workspace
      - CODEX_STATE_DIR=/tmp/codex-gateway
      - CODEX_TIMEOUT_SECONDS=${CODEX_TIMEOUT_SECONDS:-300}
      - CODEX_MAX_TIMEOUT_SECONDS=${CODEX_MAX_TIMEOUT_SECONDS:-900}
      - CODEX_MAX_TASK_CHARS=${CODEX_MAX_TASK_CHARS:-8000}
      - CODEX_MAX_OUTPUT_CHARS=${CODEX_MAX_OUTPUT_CHARS:-24000}
      - CODEX_ALLOW_WRITE=${CODEX_ALLOW_WRITE:-false}
      - CODEX_DEFAULT_MODEL=${CODEX_DEFAULT_MODEL:-}
      - CODEX_DEFAULT_REASONING_EFFORT=${CODEX_DEFAULT_REASONING_EFFORT:-low}
      - CODEX_DISABLE_CONTEXT7=${CODEX_DISABLE_CONTEXT7:-true}
    volumes:
      - ${CODEX_CONFIG_DIR:-/srv/docker/ollama/codex-config}:/home/codex/.codex
      - ${CODEX_WORKSPACE_DIR:-/srv/docker/workspace}:/workspace:ro
    mem_limit: ${CODEX_GATEWAY_MEM_LIMIT:-512m}
    mem_reservation: ${CODEX_GATEWAY_MEM_RESERVATION:-128m}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
