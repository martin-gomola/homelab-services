
# Loads the built-in integrations we use.
# Energy is intentionally excluded until we have power-measuring outlets.
# Restore it later by adding:
# energy:
assist_pipeline:
bluetooth:
cloud:
conversation:
dhcp:
file:
go2rtc:
history:
homeassistant_alerts:
logbook:
media_source:
mobile_app:
my:
ssdp:
stream:
sun:
usage_prediction:
usb:
webhook:
zeroconf:

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - ::1

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

command_line: !include command_line.yaml
template: !include templates/dashboard_sensors.yaml

lovelace:
  dashboards:
    house-home:
      mode: yaml
      title: Home
      icon: mdi:home-analytics
      show_in_sidebar: true
      filename: dashboards/home.yaml
    house-rooms:
      mode: yaml
      title: Rooms
      icon: mdi:sofa-outline
      show_in_sidebar: true
      filename: dashboards/rooms.yaml
    house-systems:
      mode: yaml
      title: Systems
      icon: mdi:leaf-circle-outline
      show_in_sidebar: true
      filename: dashboards/systems.yaml
    house-commute:
      mode: yaml
      title: Commute
      icon: mdi:bus-clock
      show_in_sidebar: true
      filename: dashboards/commute.yaml
    house-plants:
      mode: yaml
      title: Plant Sensor
      icon: mdi:sprout
      show_in_sidebar: true
      filename: dashboards/plants.yaml
    house-geekmagic:
      mode: yaml
      title: GeekMagic TV
      icon: mdi:television
      show_in_sidebar: true
      filename: dashboards/geekmagic.yaml

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
