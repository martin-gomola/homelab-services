title: Rooms
views:
  - title: Living Room
    path: living-room
    icon: mdi:sofa-outline
    cards:
      - type: custom:mushroom-title-card
        title: Living Room
        subtitle: Media, lighting, air quality, and camera.

      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: light.yeelight_stripe_0x12a2e794
            icon: mdi:led-strip-variant
            content_info: none
          - type: entity
            entity: switch.living_room
            icon: mdi:power-plug
            content_info: none
          - type: template
            entity: sensor.zhimi_de_319110959_mb4_pm2_5_density_p_3_4
            icon: mdi:air-filter
            content: "{{ states('sensor.zhimi_de_319110959_mb4_pm2_5_density_p_3_4') }}"
            icon_color: |-
              {% set pm = states('sensor.zhimi_de_319110959_mb4_pm2_5_density_p_3_4') | int(0) %}
              {% if pm > 120 %}red
              {% elif pm > 35 %}amber
              {% else %}green{% endif %}
          - type: entity
            entity: media_player.samsung_8_series_55_ue55ru8002uxxh
            icon: mdi:television
            content_info: none

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-light-card
            entity: light.yeelight_stripe_0x12a2e794
            name: Light Strip
            show_brightness_control: true
            show_color_temp_control: true
            use_light_color: true
          - type: custom:mushroom-entity-card
            entity: switch.living_room
            name: Plug
            icon: mdi:power-plug
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: switch.zhimi_de_319110959_mb4_on_p_2_1
            name: Air Purifier
            icon: mdi:air-purifier
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: media_player.samsung_8_series_55_ue55ru8002uxxh
            name: TV
            icon: mdi:television

      - type: media-control
        entity: media_player.samsung_8_series_55_ue55ru8002uxxh

      - type: entities
        title: Air Purifier
        show_header_toggle: false
        entities:
          - entity: switch.zhimi_de_319110959_mb4_on_p_2_1
            name: Power
          - entity: select.zhimi_de_319110959_mb4_mode_p_2_4
            name: Mode
          - entity: sensor.zhimi_de_319110959_mb4_pm2_5_density_p_3_4
            name: PM2.5
          - entity: sensor.zhimi_de_319110959_mb4_filter_life_level_p_4_1
            name: Filter Life
          - entity: sensor.zhimi_de_319110959_mb4_filter_used_time_p_4_3
            name: Filter Used Time
          - entity: number.zhimi_de_319110959_mb4_favorite_speed_p_9_3
            name: Favorite Speed
          - entity: number.zhimi_de_319110959_mb4_brightness_p_7_2
            name: Display Brightness
          - entity: switch.zhimi_de_319110959_mb4_physical_controls_locked_p_8_1
            name: Control Lock
          - entity: switch.zhimi_de_319110959_mb4_alarm_p_6_1
            name: Alarm

      - type: entities
        title: Living Room Camera
        show_header_toggle: false
        entities:
          - entity: switch.chuangmi_de_309337105_ipc016_on_p_2_1
            name: Camera Power
          - entity: binary_sensor.chuangmi_de_309337105_ipc016_motion_tracking_p_2_8
            name: Motion Tracking
          - entity: select.chuangmi_de_309337105_ipc016_night_shot_p_2_3
            name: Night Mode
          - entity: select.chuangmi_de_309337105_ipc016_recording_mode_p_2_7
            name: Recording Mode
          - entity: switch.chuangmi_de_309337105_ipc016_time_watermark_p_2_4
            name: Time Watermark
          - entity: switch.chuangmi_de_309337105_ipc016_wdr_mode_p_2_5
            name: WDR Mode
          - entity: switch.chuangmi_de_309337105_ipc016_glimmer_full_color_p_2_6
            name: Full Color Night Vision
          - entity: number.chuangmi_de_309337105_ipc016_image_rollover_p_2_2
            name: Image Rotation

  - title: Kitchen
    path: kitchen
    icon: mdi:silverware-fork-knife
    cards:
      - type: custom:mushroom-title-card
        title: Kitchen
        subtitle: Plug control and camera monitoring.

      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: switch.kitchen
            icon: mdi:power-plug
            content_info: none
          - type: entity
            entity: switch.mxiang_de_1147325117_c301_on_p_2_1
            icon: mdi:cctv
            content_info: none
          - type: conditional
            conditions:
              - entity: switch.mxiang_de_1147325117_c301_motion_detection_p_5_1
                state: "on"
            chip:
              type: template
              icon: mdi:motion-sensor
              icon_color: green
              content: ""
          - type: conditional
            conditions:
              - entity: switch.mxiang_de_1147325117_c301_human_detection_p_8_6
                state: "on"
            chip:
              type: template
              icon: mdi:human-greeting-proximity
              icon_color: green
              content: ""

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: switch.kitchen
            name: Plug
            icon: mdi:power-plug
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: switch.mxiang_de_1147325117_c301_on_p_2_1
            name: Camera Power
            icon: mdi:cctv
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: switch.mxiang_de_1147325117_c301_motion_detection_p_5_1
            name: Motion Detection
            icon: mdi:motion-sensor
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: switch.mxiang_de_1147325117_c301_human_detection_p_8_6
            name: Human Detection
            icon: mdi:human-greeting-proximity
            tap_action:
              action: toggle

      - type: entities
        title: Camera Activity
        show_header_toggle: false
        entities:
          - entity: binary_sensor.mxiang_de_1147325117_c301_ptz_camera_p_2_2
            name: PTZ Camera
          - entity: event.mxiang_de_1147325117_c301_object_motion_e_8_4
            name: Last Object Motion
          - entity: event.mxiang_de_1147325117_c301_someone_appeared_e_8_5
            name: Last Person Event
          - entity: sensor.mxiang_de_1147325117_c301_status_p_3_1
            name: Memory Card Status
          - entity: sensor.mxiang_de_1147325117_c301_remaining_recording_duration_p_3_6
            name: Remaining Recording
          - entity: sensor.mxiang_de_1147325117_c301_storage_free_space_p_3_3
            name: Free Space
          - entity: sensor.mxiang_de_1147325117_c301_storage_total_space_p_3_2
            name: Total Space
          - entity: sensor.mxiang_de_1147325117_c301_storage_used_space_p_3_4
            name: Used Space

      - type: entities
        title: Camera Settings
        show_header_toggle: false
        entities:
          - entity: light.mxiang_de_1147325117_c301_s_4_indicator_light
            name: Indicator Light
          - entity: switch.mxiang_de_1147325117_c301_motion_tracking_p_2_8
            name: Motion Tracking
          - entity: switch.mxiang_de_1147325117_c301_move_detection_p_8_7
            name: Move Detection
          - entity: switch.mxiang_de_1147325117_c301_local_storage_p_2_12
            name: Local Storage
          - entity: switch.mxiang_de_1147325117_c301_mute_p_6_2
            name: Mute
          - entity: select.mxiang_de_1147325117_c301_detection_sensitivity_p_5_3
            name: Detection Sensitivity
          - entity: select.mxiang_de_1147325117_c301_night_shot_p_2_3
            name: Night Mode
          - entity: select.mxiang_de_1147325117_c301_recording_mode_p_2_11
            name: Recording Mode
          - entity: text.mxiang_de_1147325117_c301_motion_detection_start_time_p_5_4
            name: Detection Start
          - entity: text.mxiang_de_1147325117_c301_motion_detection_end_time_p_5_5
            name: Detection End

      - type: grid
        columns: 3
        square: false
        cards:
          - type: button
            entity: button.mxiang_de_1147325117_c301_ptz_calibrate_a_2_1
            name: Calibrate PTZ
          - type: button
            entity: button.mxiang_de_1147325117_c301_restart_device_a_2_2
            name: Restart Camera
          - type: button
            entity: button.mxiang_de_1147325117_c301_upload_video_a_9_3
            name: Upload Video
          - type: button
            entity: button.mxiang_de_1147325117_c301_get_stream_configuration_a_19_3
            name: Stream Config

  - title: Bedroom
    path: bedroom
    icon: mdi:bed-king-outline
    cards:
      - type: custom:mushroom-title-card
        title: Bedroom
        subtitle: >-
          {{ states('sensor.humidifier_humidity') }}% humidity
          · {{ states('sensor.humidifier_temperature') }}°C

      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: switch.humidifier_power
            icon: mdi:air-humidifier
            content_info: none
          - type: entity
            entity: fan.zhimi_de_106389295_za4_s_2_fan
            icon: mdi:fan
            content_info: none
          - type: template
            entity: sensor.humidifier_humidity
            icon: mdi:water
            content: "{{ states('sensor.humidifier_humidity') }}%"
            icon_color: |-
              {% set h = states('sensor.humidifier_humidity') | int(0) %}
              {% if h < 35 %}red
              {% elif h < 45 %}amber
              {% else %}green{% endif %}
          - type: conditional
            conditions:
              - entity: binary_sensor.humidifier_tank
                state: "on"
            chip:
              type: template
              icon: mdi:cup-water
              icon_color: red
              content: Tank empty

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: switch.humidifier_power
            name: Humidifier Power
            icon: mdi:air-humidifier
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: humidifier.humidifier
            name: Humidifier Mode
          - type: custom:mushroom-fan-card
            entity: fan.zhimi_de_106389295_za4_s_2_fan
            name: Fan
            show_percentage_control: true
          - type: custom:mushroom-entity-card
            entity: fan.humidifier_spray_level
            name: Spray Level

      - type: entities
        title: Humidifier
        show_header_toggle: false
        entities:
          - entity: humidifier.humidifier
            name: Mode
          - entity: switch.humidifier_power
            name: Power
          - entity: fan.humidifier_spray_level
          - entity: sensor.humidifier_temperature
          - entity: select.humidifier_timer
          - entity: select.humidifier_temperature_unit
          - entity: switch.humidifier_warm_mist
          - entity: switch.humidifier_plasma
          - entity: switch.humidifier_uv_sterilization
          - entity: light.humidifier_indicator
          - entity: binary_sensor.humidifier_tank
          - entity: binary_sensor.humidifier_problem

      - type: entities
        title: Fan
        show_header_toggle: false
        entities:
          - entity: fan.zhimi_de_106389295_za4_s_2_fan
            name: Power
          - entity: select.zhimi_de_106389295_za4_fan_level_a_p_2_2
            name: Fan Speed
          - entity: number.zhimi_de_106389295_za4_countdown_time_p_6_1
            name: Countdown
          - entity: select.zhimi_de_106389295_za4_brightness_p_5_1
            name: Display Brightness
          - entity: switch.zhimi_de_106389295_za4_physical_controls_locked_p_3_1
            name: Lock Controls
          - entity: switch.zhimi_de_106389295_za4_alarm_p_4_1
            name: Alarm
          - entity: number.zhimi_de_106389295_za4_horizontal_swing_included_angle_p_2_4
            name: Swing Angle

      - type: grid
        columns: 2
        square: false
        cards:
          - type: button
            entity: button.zhimi_de_106389295_za4_turn_left_a_2_1
            name: Turn Left
          - type: button
            entity: button.zhimi_de_106389295_za4_turn_right_a_2_2
            name: Turn Right
