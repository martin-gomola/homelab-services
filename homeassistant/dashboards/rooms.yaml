title: Rooms
views:
  - title: Living Room
    path: living-room
    icon: mdi:sofa-outline
    cards:
      - type: markdown
        content: |
          ## Living Room
          Media, lighting, air quality, and the room camera.

      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: light.yeelight_stripe_0x12a2e794
            name: Light Strip
          - type: tile
            entity: switch.living_room
            name: Plug
          - type: tile
            entity: switch.zhimi_de_319110959_mb4_on_p_2_1
            name: Air Purifier
          - type: tile
            entity: media_player.samsung_8_series_55_ue55ru8002uxxh
            name: TV

      - type: light
        entity: light.yeelight_stripe_0x12a2e794
        name: Light Strip Studio
        brightness: true
        color_temp: true
        effect_list: true

      - type: media-control
        entity: media_player.samsung_8_series_55_ue55ru8002uxxh

      - type: entities
