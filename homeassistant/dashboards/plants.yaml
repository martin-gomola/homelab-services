title: Plant Sensor
views:
  - title: Overview
    path: overview
    icon: mdi:sprout
    type: sidebar
    cards:
      - type: custom:mushroom-title-card
        title: Plant Sensor
        subtitle: >-
          Soil {{ states('sensor.plant_01_soil_moisture') }}%
          · {{ states('sensor.plant_01_temperature') }}°C
          · Battery {{ states('sensor.plant_01_battery') }}%

      - type: custom:mushroom-chips-card
        chips:
          - type: template
            entity: sensor.plant_01_soil_moisture
            icon: mdi:water-percent
            content: "{{ states('sensor.plant_01_soil_moisture') }}%"
            icon_color: |-
              {% set m = states('sensor.plant_01_soil_moisture') | int(0) %}
              {% if m < 25 %}red
              {% elif m < 45 %}amber
              {% else %}green{% endif %}

          - type: template
            entity: sensor.plant_01_soil_fertility
            icon: mdi:flask-outline
            content: "{{ states('sensor.plant_01_soil_fertility') }}"
            icon_color: |-
              {% set f = states('sensor.plant_01_soil_fertility') | int(0) %}
              {% if f < 1200 %}red
              {% elif f < 2000 %}amber
              {% else %}green{% endif %}

          - type: template
            entity: sensor.plant_01_illuminance
            icon: mdi:white-balance-sunny
            content: "{{ states('sensor.plant_01_illuminance') }} lx"
            icon_color: |-
              {% set lx = states('sensor.plant_01_illuminance') | int(0) %}
              {% if lx < 200 %}red
              {% elif lx < 1500 %}amber
              {% else %}green{% endif %}

          - type: template
            entity: sensor.plant_01_battery
            icon: >-
              {% set b = states('sensor.plant_01_battery') | int(0) %}
              {% if b < 20 %}mdi:battery-low
              {% elif b < 50 %}mdi:battery-50
              {% else %}mdi:battery{% endif %}
            content: "{{ states('sensor.plant_01_battery') }}%"
            icon_color: |-
              {% set b = states('sensor.plant_01_battery') | int(0) %}
              {% if b < 20 %}red
              {% elif b < 50 %}amber
              {% else %}green{% endif %}

          - type: conditional
            conditions:
              - entity: sensor.plant_01_water_warning
                state_not: "0"
            chip:
              type: template
              icon: mdi:water-alert
              icon_color: red
              content: Needs water

          - type: conditional
            conditions:
              - entity: sensor.plant_01_soil_fertility_warning
                state_not: "0"
            chip:
              type: template
              icon: mdi:alert-circle
              icon_color: amber
              content: Low fertility

      - type: grid
        title: At A Glance
        columns: 2
        square: false
        view_layout:
          position: sidebar
        cards:
          - type: gauge
            entity: sensor.plant_01_soil_moisture
            name: Soil Moisture
            min: 0
            max: 100
            severity:
              green: 45
              yellow: 25
              red: 10
          - type: gauge
            entity: sensor.plant_01_humidity
            name: Air Humidity
            min: 0
            max: 100
            severity:
              green: 55
              yellow: 35
              red: 20
          - type: custom:mushroom-entity-card
            entity: sensor.plant_01_temperature
            name: Temperature
            icon: mdi:thermometer
            icon_color: |-
              {% set t = states('sensor.plant_01_temperature') | float(0) %}
              {% if t >= 30 %}red
              {% elif t >= 25 %}amber
              {% elif t < 10 %}blue
              {% else %}green{% endif %}
          - type: custom:mushroom-entity-card
            entity: sensor.plant_01_illuminance
            name: Light
            icon: mdi:white-balance-sunny
            icon_color: |-
              {% set lx = states('sensor.plant_01_illuminance') | int(0) %}
              {% if lx < 200 %}deep-purple
              {% elif lx < 1500 %}amber
              {% else %}yellow{% endif %}

      - type: entities
        title: Plant Health
        show_header_toggle: false
        view_layout:
          position: sidebar
        entities:
          - entity: sensor.plant_01_water_warning
            name: Water Warning
          - entity: sensor.plant_01_soil_fertility_warning
            name: Fertility Warning
          - entity: sensor.plant_01_soil_fertility
            name: Soil Fertility
          - entity: sensor.plant_01_battery
            name: Battery

      - type: history-graph
        title: Daily Trends
        hours_to_show: 24
        entities:
          - entity: sensor.plant_01_soil_moisture
            name: Soil Moisture
          - entity: sensor.plant_01_humidity
            name: Air Humidity
          - entity: sensor.plant_01_temperature
            name: Temperature

      - type: history-graph
        title: Light And Fertility
        hours_to_show: 24
        entities:
          - entity: sensor.plant_01_illuminance
            name: Light
          - entity: sensor.plant_01_soil_fertility
            name: Soil Fertility

      - type: grid
        title: Care Settings
        columns: 2
        square: false
        view_layout:
          position: sidebar
        cards:
          - type: entities
            title: Thresholds
            show_header_toggle: false
            entities:
              - entity: number.plant_01_soil_warning
                name: Soil Warning
              - entity: number.plant_01_soil_fertility_warning_setting
                name: Fertility Warning
              - entity: number.plant_01_soil_sampling
                name: Sampling Interval
          - type: entities
            title: Calibration
            show_header_toggle: false
            entities:
              - entity: number.plant_01_humidity_calibration
                name: Humidity
              - entity: number.plant_01_temperature_calibration
                name: Temperature
              - entity: number.plant_01_soil_calibration
                name: Soil Moisture
              - entity: number.plant_01_illuminance_calibration
                name: Light
