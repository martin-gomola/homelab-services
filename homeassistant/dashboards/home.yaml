title: Home
views:
  - title: Home
    path: home
    icon: mdi:home
    badges:
      - entity: sensor.plant_01_humidity
        name: Plant Humidity
      - entity: sensor.humidifier_humidity
        name: Humidifier Humidity
      - entity: binary_sensor.humidifier_tank
        name: Tank
    cards:
      - type: glance
        title: At A Glance
        columns: 3
        entities:
          - entity: person.beskar_labs
            name: Martin
          - entity: sensor.cp_to_nova_doba
            name: To Nova doba
          - entity: sensor.cp_to_hubeneho
            name: Back home  
      - type: weather-forecast
        entity: weather.forecast_home
        forecast_type: daily

      - type: grid
        title: Comfort Snapshot
        columns: 2
        square: false
        cards:
          - type: gauge
            entity: sensor.plant_01_illuminance
            name: Plant Lux
            min: 0
            max: 20000
            needle: true
            severity:
              red: 0
              yellow: 200
              green: 1500
          - type: gauge
            entity: sensor.zhimi_de_319110959_mb4_pm2_5_density_p_3_4
            name: PM2.5
            min: 0
            max: 500
            severity:
              green: 0
              yellow: 35
              red: 120
          - type: gauge
            entity: sensor.plant_01_humidity
            name: Plant Humidity
            min: 0
            max: 100
            severity:
              red: 0
              yellow: 35
              green: 50
          - type: gauge
            entity: sensor.humidifier_humidity
            name: Bedroom Humidity
            min: 0
            max: 100
            severity:
              red: 0
              yellow: 35
              green: 45

      - type: grid
        title: Temperature Snapshot
        columns: 2
        square: false
        cards:
          - type: tile
            entity: sensor.plant_01_temperature
            name: Plant Temperature
          - type: tile
            entity: sensor.humidifier_temperature
            name: Humidifier Temperature

      - type: grid
        title: Commute Snapshot
        columns: 2
        square: false
        cards:
          - type: tile
            entity: sensor.cp_to_nova_doba
            name: To Nova doba
            icon: mdi:bus-clock
          - type: tile
            entity: sensor.cp_to_hubeneho
            name: Back to Hubeneho
            icon: mdi:bus-clock

      - type: markdown
        content: |
          ## Quick Controls

      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: light.yeelight_stripe_0x12a2e794
            name: Light Strip
          - type: tile
            entity: switch.living_room
            name: Living Room Switch
          - type: tile
            entity: switch.kitchen
            name: Kitchen Switch
          - type: tile
            entity: switch.humidifier_power
            name: Humidifier Power
          - type: tile
            entity: switch.zhimi_de_319110959_mb4_on_p_2_1
            name: Air Purifier
          - type: tile
            entity: fan.zhimi_de_106389295_za4_s_2_fan
            name: Bedroom Fan

      - type: light
        entity: light.yeelight_stripe_0x12a2e794
        name: Light Strip Studio
        brightness: true
        color_temp: true
        effect_list: true
