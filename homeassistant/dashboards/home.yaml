title: Home
views:
  - title: Home
    path: home
    icon: mdi:home
    cards:
      - type: custom:mushroom-title-card
        title: >-
          {%- if now().hour < 12 -%}Good morning
          {%- elif now().hour < 18 -%}Good afternoon
          {%- else -%}Good evening{%- endif -%}, {{ user }}.
        subtitle: >-
          {{ states('weather.forecast_home') | capitalize }}
          · {{ state_attr('weather.forecast_home', 'temperature') }}°C

      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: person.beskar_labs
            use_entity_picture: true
            content_info: none

          - type: template
            entity: sensor.plant_01_soil_moisture
            icon: mdi:water-percent
            content: "{{ states('sensor.plant_01_soil_moisture') }}%"
            icon_color: |-
              {% set m = states('sensor.plant_01_soil_moisture') | int(0) %}
              {% if m < 25 %}red
              {% elif m < 45 %}amber
              {% else %}green{% endif %}
            tap_action:
              action: navigate
              navigation_path: /house-plants/overview

          - type: template
            entity: sensor.zhimi_de_319110959_mb4_pm2_5_density_p_3_4
            icon: mdi:air-filter
            content: "{{ states('sensor.zhimi_de_319110959_mb4_pm2_5_density_p_3_4') }}"
            icon_color: |-
              {% set pm = states('sensor.zhimi_de_319110959_mb4_pm2_5_density_p_3_4') | int(0) %}
              {% if pm > 120 %}red
              {% elif pm > 35 %}amber
              {% else %}green{% endif %}

          - type: template
            entity: sensor.humidifier_humidity
            icon: mdi:water
            content: "{{ states('sensor.humidifier_humidity') }}%"
            icon_color: |-
              {% set h = states('sensor.humidifier_humidity') | int(0) %}
              {% if h < 35 %}red
              {% elif h < 45 %}amber
              {% else %}green{% endif %}

          - type: conditional
            conditions:
              - entity: binary_sensor.humidifier_tank
                state: "on"
            chip:
              type: template
              icon: mdi:cup-water
              icon_color: red
              content: Tank empty

          - type: entity
            entity: sensor.cp_to_nova_doba
            icon: mdi:bus-clock
            tap_action:
              action: navigate
              navigation_path: /house-commute/commute

      - type: weather-forecast
        entity: weather.forecast_home
        forecast_type: daily

      - type: grid
        title: Comfort Snapshot
        columns: 2
        square: false
        cards:
          - type: gauge
            entity: sensor.plant_01_illuminance
            name: Plant Lux
            min: 0
            max: 20000
            needle: true
            severity:
              red: 0
              yellow: 200
              green: 1500
          - type: gauge
            entity: sensor.zhimi_de_319110959_mb4_pm2_5_density_p_3_4
            name: PM2.5
            min: 0
            max: 500
            severity:
              green: 0
              yellow: 35
              red: 120
          - type: gauge
            entity: sensor.plant_01_humidity
            name: Plant Humidity
            min: 0
            max: 100
            severity:
              red: 0
              yellow: 35
              green: 50
          - type: gauge
            entity: sensor.humidifier_humidity
            name: Bedroom Humidity
            min: 0
            max: 100
            severity:
              red: 0
              yellow: 35
              green: 45

      - type: grid
        title: Temperature Snapshot
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.plant_01_temperature
            name: Plant
            icon: mdi:thermometer
            icon_color: |-
              {% set t = states('sensor.plant_01_temperature') | float(0) %}
              {% if t >= 30 %}red
              {% elif t >= 25 %}amber
              {% elif t < 10 %}blue
              {% else %}green{% endif %}
          - type: custom:mushroom-entity-card
            entity: sensor.humidifier_temperature
            name: Bedroom
            icon: mdi:thermometer
            icon_color: |-
              {% set t = states('sensor.humidifier_temperature') | float(0) %}
              {% if t >= 30 %}red
              {% elif t >= 25 %}amber
              {% elif t < 10 %}blue
              {% else %}green{% endif %}

      - type: grid
        title: Commute Snapshot
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.cp_to_nova_doba
            name: To Nova doba
            icon: mdi:bus-clock
            tap_action:
              action: navigate
              navigation_path: /house-commute/commute
          - type: custom:mushroom-entity-card
            entity: sensor.cp_to_hubeneho
            name: Back to Hubeneho
            icon: mdi:bus-clock
            tap_action:
              action: navigate
              navigation_path: /house-commute/commute

      - type: custom:mushroom-title-card
        title: Quick Controls

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-light-card
            entity: light.yeelight_stripe_0x12a2e794
            name: Light Strip
            show_brightness_control: true
            show_color_temp_control: true
            use_light_color: true
          - type: custom:mushroom-entity-card
            entity: switch.living_room
            name: Living Room
            icon: mdi:power-plug
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: switch.kitchen
            name: Kitchen
            icon: mdi:power-plug
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: switch.humidifier_power
            name: Humidifier
            icon: mdi:air-humidifier
            tap_action:
              action: toggle
          - type: custom:mushroom-entity-card
            entity: switch.zhimi_de_319110959_mb4_on_p_2_1
            name: Air Purifier
            icon: mdi:air-purifier
            tap_action:
              action: toggle
          - type: custom:mushroom-fan-card
            entity: fan.zhimi_de_106389295_za4_s_2_fan
            name: Bedroom Fan
            show_percentage_control: true
