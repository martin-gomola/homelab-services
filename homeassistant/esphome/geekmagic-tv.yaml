esphome:
  name: geekmagic-tv
  friendly_name: GeekMagic TV
  min_version: 2024.11.0
  on_boot:
    priority: 10
    then:
      - light.turn_on:
          id: backlight
          brightness: 80%
      - delay: 2s
      - lambda: "id(page_num) = 1;"
      - component.update: display0

esp8266:
  board: esp01_1m

external_components:
  - source:
      type: git
      url: https://github.com/rletendu/esphome.git
      ref: st7789_nobuffer_202312
    components: [st7789v]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  ap:
    ssid: "GeekMagic-TV Fallback"
    password: !secret fallback_password

captive_portal:

api:
  actions:
    - action: notify
      variables:
        message: string
        timeout: int
      then:
        - lambda: |-
            id(notif_text) = message;
            id(notif_timeout) = timeout;
            id(notif_active) = true;
        - component.update: display0
        - delay: !lambda "return id(notif_timeout) * 1000;"
        - lambda: "id(notif_active) = false;"
        - component.update: display0
    - action: next_page
      then:
        - lambda: |-
            id(page_num) = (id(page_num) % 3) + 1;
        - component.update: display0
    - action: set_page
      variables:
        page: int
      then:
        - lambda: "id(page_num) = page;"
        - component.update: display0

ota:
  platform: esphome

web_server:
  port: 80

mdns:

safe_mode:

globals:
  - id: page_num
    type: int
    initial_value: "1"
  - id: notif_active
    type: bool
    initial_value: "false"
  - id: notif_text
    type: std::string
    initial_value: '""'
  - id: notif_timeout
    type: int
    initial_value: "10"

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  interface: hardware

time:
  - platform: homeassistant
    id: ha_time

output:
  - platform: esp8266_pwm
    pin: GPIO05
    frequency: 40 Hz
    id: backlight_pwm
    inverted: true

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Backlight"
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON

switch:
  - platform: template
    name: "Page Rotation"
    id: page_rotation
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

button:
  - platform: restart
    name: "Restart"
  - platform: template
    name: "Next Page"
    on_press:
      - lambda: "id(page_num) = (id(page_num) % 3) + 1;"
      - component.update: display0
  - platform: template
    name: "Previous Page"
    on_press:
      - lambda: "id(page_num) = ((id(page_num) - 2 + 3) % 3) + 1;"
      - component.update: display0

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_sensor
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
  - platform: homeassistant
    id: ha_temperature
    entity_id: sensor.outdoor_temperature
    internal: true
  - platform: homeassistant
    id: ha_humidity
    entity_id: sensor.outdoor_humidity
    internal: true
  - platform: homeassistant
    id: ha_soil_moisture
    entity_id: sensor.soil_moisture_sensor_soil_moisture
    internal: true
  - platform: homeassistant
    id: ha_soil_temp
    entity_id: sensor.soil_moisture_sensor_temperature
    internal: true
  - platform: homeassistant
    id: ha_soil_fertility
    entity_id: sensor.soil_moisture_sensor_soil_ec
    internal: true
  - platform: homeassistant
    id: ha_illuminance
    entity_id: sensor.soil_moisture_sensor_illuminance_lux
    internal: true

text_sensor:
  - platform: homeassistant
    id: ha_weather
    entity_id: weather.forecast_home
    internal: true
    attribute: friendly_name

font:
  - file:
      type: gfonts
      family: Inter Tight
      weight: 700
    id: font_large
    size: 28
    glyphs: '!"%()+,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/'
    bpp: 2
  - file:
      type: gfonts
      family: Inter Tight
      weight: 400
    id: font_medium
    size: 20
    glyphs: '!"%()+,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/'
    bpp: 2
  - file:
      type: gfonts
      family: Inter Tight
      weight: 400
    id: font_small
    size: 15
    glyphs: '!"%()+,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/'
    bpp: 2

color:
  - id: color_white
    hex: "FFFFFF"
  - id: color_bg
    hex: "1e1e2e"
  - id: color_green
    hex: "a6da95"
  - id: color_blue
    hex: "89b4fa"
  - id: color_yellow
    hex: "f9e2af"
  - id: color_red
    hex: "f38ba8"
  - id: color_peach
    hex: "fab387"
  - id: color_teal
    hex: "94e2d5"
  - id: color_mauve
    hex: "cba6f7"
  - id: color_surface
    hex: "313244"
  - id: color_subtext
    hex: "a6adc8"

interval:
  - interval: 8s
    then:
      - if:
          condition:
            and:
              - switch.is_on: page_rotation
              - lambda: "return !id(notif_active);"
          then:
            - lambda: "id(page_num) = (id(page_num) % 3) + 1;"
            - component.update: display0

display:
  - platform: st7789v
    id: display0
    model: Custom
    height: 240
    width: 240
    offset_height: 0
    offset_width: 0
    cs_pin: GPIO15
    dc_pin: GPIO0
    reset_pin: GPIO2
    eightbitcolor: false
    update_interval: never
    lambda: |-
      auto w = it.get_width();
      auto h = it.get_height();

      // Background
      it.fill(id(color_bg));

      // --- Notification overlay ---
      if (id(notif_active)) {
        it.filled_rectangle(0, 0, w, h, id(color_surface));
        it.filled_rectangle(10, 10, w - 20, 4, id(color_mauve));
        it.printf(w / 2, 50, id(font_medium), id(color_mauve), TextAlign::TOP_CENTER, "NOTIFICATION");
        // Word wrap the notification
        int y = 90;
        std::string msg = id(notif_text);
        while (msg.length() > 0 && y < 220) {
          int len = msg.length() > 18 ? 18 : msg.length();
          it.printf(w / 2, y, id(font_medium), id(color_white), TextAlign::TOP_CENTER, "%s", msg.substr(0, len).c_str());
          msg = msg.substr(len);
          y += 26;
        }
        return;
      }

      // --- Page indicator dots ---
      for (int i = 0; i < 3; i++) {
        auto c = (i + 1 == id(page_num)) ? id(color_mauve) : id(color_surface);
        it.filled_circle(w / 2 - 12 + i * 12, h - 8, 3, c);
      }

      // === PAGE 1: Clock + Weather ===
      if (id(page_num) == 1) {
        auto time = id(ha_time).now();
        if (time.is_valid()) {
          it.printf(w / 2, 20, id(font_large), id(color_white), TextAlign::TOP_CENTER, "%02d:%02d", time.hour, time.minute);
          it.printf(w / 2, 55, id(font_small), id(color_subtext), TextAlign::TOP_CENTER, "%s %d %s",
            time.strftime("%a").c_str(), time.day_of_month, time.strftime("%b").c_str());
        }
        it.filled_rectangle(20, 82, w - 40, 1, id(color_surface));

        // Weather
        if (id(ha_temperature).has_state()) {
          it.printf(w / 2, 95, id(font_large), id(color_peach), TextAlign::TOP_CENTER, "%.1f°C", id(ha_temperature).state);
        }
        if (id(ha_humidity).has_state()) {
          it.printf(w / 2, 130, id(font_medium), id(color_blue), TextAlign::TOP_CENTER, "%.0f%% humidity", id(ha_humidity).state);
        }

        // Soil quick status
        it.filled_rectangle(20, 165, w - 40, 1, id(color_surface));
        if (id(ha_soil_moisture).has_state()) {
          auto soil = id(ha_soil_moisture).state;
          auto c = soil < 30 ? id(color_red) : soil < 50 ? id(color_yellow) : id(color_green);
          it.printf(20, 175, id(font_small), id(color_subtext), TextAlign::TOP_LEFT, "Soil");
          it.printf(w - 20, 175, id(font_medium), c, TextAlign::TOP_RIGHT, "%.0f%%", soil);
          // Progress bar
          it.filled_rectangle(20, 200, w - 40, 8, id(color_surface));
          int bar_w = (int)((w - 40) * soil / 100.0);
          if (bar_w > 0) it.filled_rectangle(20, 200, bar_w, 8, c);
        }
      }

      // === PAGE 2: Garden Sensors ===
      else if (id(page_num) == 2) {
        it.printf(w / 2, 10, id(font_medium), id(color_green), TextAlign::TOP_CENTER, "Garden");
        it.filled_rectangle(20, 35, w - 40, 1, id(color_surface));

        int y = 45;
        // Soil moisture
        if (id(ha_soil_moisture).has_state()) {
          auto val = id(ha_soil_moisture).state;
          auto c = val < 30 ? id(color_red) : val < 50 ? id(color_yellow) : id(color_green);
          it.printf(20, y, id(font_small), id(color_subtext), TextAlign::TOP_LEFT, "Moisture");
          it.printf(w - 20, y, id(font_medium), c, TextAlign::TOP_RIGHT, "%.0f%%", val);
        }
        y += 35;
        // Temperature
        if (id(ha_soil_temp).has_state()) {
          it.printf(20, y, id(font_small), id(color_subtext), TextAlign::TOP_LEFT, "Temperature");
          it.printf(w - 20, y, id(font_medium), id(color_peach), TextAlign::TOP_RIGHT, "%.1f°C", id(ha_soil_temp).state);
        }
        y += 35;
        // Fertility
        if (id(ha_soil_fertility).has_state()) {
          it.printf(20, y, id(font_small), id(color_subtext), TextAlign::TOP_LEFT, "Fertility");
          it.printf(w - 20, y, id(font_medium), id(color_teal), TextAlign::TOP_RIGHT, "%.0f uS", id(ha_soil_fertility).state);
        }
        y += 35;
        // Light
        if (id(ha_illuminance).has_state()) {
          it.printf(20, y, id(font_small), id(color_subtext), TextAlign::TOP_LEFT, "Light");
          it.printf(w - 20, y, id(font_medium), id(color_yellow), TextAlign::TOP_RIGHT, "%.0f lx", id(ha_illuminance).state);
        }
      }

      // === PAGE 3: System Info ===
      else if (id(page_num) == 3) {
        it.printf(w / 2, 10, id(font_medium), id(color_blue), TextAlign::TOP_CENTER, "System");
        it.filled_rectangle(20, 35, w - 40, 1, id(color_surface));

        auto time = id(ha_time).now();
        if (time.is_valid()) {
          it.printf(w / 2, 50, id(font_large), id(color_white), TextAlign::TOP_CENTER, "%02d:%02d:%02d", time.hour, time.minute, time.second);
        }

        it.printf(20, 100, id(font_small), id(color_subtext), TextAlign::TOP_LEFT, "WiFi");
        it.printf(w - 20, 100, id(font_small), id(color_green), TextAlign::TOP_RIGHT, "%.0f dBm", id(wifi_signal_sensor).state);

        it.printf(20, 125, id(font_small), id(color_subtext), TextAlign::TOP_LEFT, "IP");
        it.printf(w - 20, 125, id(font_small), id(color_white), TextAlign::TOP_RIGHT, "%s", WiFi.localIP().toString().c_str());

        it.printf(20, 150, id(font_small), id(color_subtext), TextAlign::TOP_LEFT, "Free heap");
        it.printf(w - 20, 150, id(font_small), id(color_white), TextAlign::TOP_RIGHT, "%d B", ESP.getFreeHeap());

        it.printf(20, 175, id(font_small), id(color_subtext), TextAlign::TOP_LEFT, "Uptime");
        int up = (int)id(uptime_sensor).state;
        int hrs = up / 3600;
        int mins = (up % 3600) / 60;
        it.printf(w - 20, 175, id(font_small), id(color_white), TextAlign::TOP_RIGHT, "%dh %dm", hrs, mins);

        it.printf(w / 2, 210, id(font_small), id(color_subtext), TextAlign::TOP_CENTER, "GeekMagic TV");
      }
