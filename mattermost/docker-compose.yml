name: mattermost

services:
  mattermost:
    image: ${MATTERMOST_IMAGE:-mattermost/mattermost-enterprise-edition}:${MATTERMOST_VERSION:-11.4.1}
    platform: linux/amd64
    container_name: mattermost
    env_file:
      - .env
    ports:
      - "${MATTERMOST_PORT:-8065}:8065"
    volumes:
      - ${DATA_DIR:-/srv/docker}/mattermost/config:/mattermost/config:rw
      - ${DATA_DIR:-/srv/docker}/mattermost/data:/mattermost/data:rw
      - ${DATA_DIR:-/srv/docker}/mattermost/logs:/mattermost/logs:rw
      - ${DATA_DIR:-/srv/docker}/mattermost/plugins:/mattermost/plugins:rw
      - ${DATA_DIR:-/srv/docker}/mattermost/client-plugins:/mattermost/client/plugins:rw
      - ${DATA_DIR:-/srv/docker}/mattermost/bleve-indexes:/mattermost/bleve-indexes:rw
    environment:
      TZ: ${TZ:-UTC}
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://${MM_DB_USER}:${MM_DB_PASSWORD}@mattermost_postgres:5432/${MM_DB_NAME}?sslmode=disable&connect_timeout=10
      MM_BLEVESETTINGS_INDEXDIR: /mattermost/bleve-indexes
      MM_SERVICESETTINGS_SITEURL: ${MM_SITE_URL}
      MM_SERVICESETTINGS_WEBSOCKETURL: ${MM_WEBSOCKET_URL:-}
      MM_SERVICESETTINGS_ALLOWCORSFROM: ${MM_ALLOW_CORS_FROM:-}
      MM_SERVICESETTINGS_LISTENADDRESS: ":8065"
      MM_PLUGINSETTINGS_ENABLE: "true"
      MM_PLUGINSETTINGS_ENABLEUPLOADS: ${MM_PLUGIN_UPLOADS_ENABLED:-true}
      MM_EMAILSETTINGS_SMTPSERVER: ${SMTP_HOST:-}
      MM_EMAILSETTINGS_SMTPPORT: ${SMTP_PORT:-587}
      MM_EMAILSETTINGS_SMTPUSERNAME: ${SMTP_USER:-}
      MM_EMAILSETTINGS_SMTPPASSWORD: ${SMTP_PASSWORD:-}
      MM_EMAILSETTINGS_ENABLESMTPAUTH: ${MM_SMTP_AUTH:-true}
      MM_EMAILSETTINGS_CONNECTIONSECURITY: ${MM_SMTP_SECURITY:-STARTTLS}
      MM_EMAILSETTINGS_FEEDBACKEMAIL: ${MM_FEEDBACK_EMAIL:-}
      MM_EMAILSETTINGS_REPLYTOADDRESS: ${MM_REPLY_TO_EMAIL:-}
    depends_on:
      mattermost_postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Mattermost 11+ image is distroless (no curl/wget/shell available)
      test: ["CMD", "/mattermost/bin/mattermost", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 10s
    networks:
      - mattermost_network

  codex-bridge:
    build:
      context: ./codex-bridge
    container_name: mattermost_codex_bridge
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
      CODEX_BRIDGE_API_KEY: ${AGENTS_CODEX_API_KEY:-}
      CODEX_WORKDIR: /workspace
      CODEX_STATE_DIR: /tmp/codex-bridge
      CODEX_ALLOW_WRITE: ${CODEX_ALLOW_WRITE:-false}
      CODEX_DEFAULT_MODEL: ${AGENTS_CODEX_MODEL:-gpt-5-codex}
      CODEX_DEFAULT_REASONING_EFFORT: ${CODEX_DEFAULT_REASONING_EFFORT:-low}
      CODEX_DISABLE_CONTEXT7: ${CODEX_DISABLE_CONTEXT7:-true}
      CODEX_TIMEOUT_SECONDS: ${CODEX_TIMEOUT_SECONDS:-300}
      CODEX_MAX_TIMEOUT_SECONDS: ${CODEX_MAX_TIMEOUT_SECONDS:-900}
    volumes:
      - ${CODEX_CONFIG_DIR:-/srv/docker/codex-config}:/home/codex/.codex
      - ${CODEX_WORKSPACE_DIR:-/srv/docker/workspace}:/workspace
    expose:
      - "8092"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 10s
    networks:
      - mattermost_network

  mattermost_postgres:
    image: postgres:16-alpine
    container_name: mattermost_postgres
    environment:
      POSTGRES_USER: ${MM_DB_USER}
      POSTGRES_PASSWORD: ${MM_DB_PASSWORD}
      POSTGRES_DB: ${MM_DB_NAME}
    volumes:
      - ${DATA_DIR:-/srv/docker}/mattermost/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MM_DB_USER:-mattermost} -d ${MM_DB_NAME:-mattermost}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 10s
    networks:
      - mattermost_network

networks:
  mattermost_network:
    driver: bridge
